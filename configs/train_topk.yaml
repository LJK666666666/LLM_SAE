# TopK SAE 训练默认配置
# 高频参数 (lr / k / d_sae / tag) 通过命令行覆盖，低频参数放此处

model:
  model_dir: Qwen3.5-0.8B
  hook_layer: 12
  dtype: bfloat16        # 模型权重 dtype
  device: cuda           # cuda / cpu / auto

sae:
  variant: topk          # topk | jumprelu
  d_in: 1024             # = Qwen3.5 hidden_size
  d_sae: 16384           # 字典维度（16x 扩展）
  k: 32                  # top-k 稀疏度
  k_aux: 256             # aux_k_loss 的 k
  aux_loss_coef: 0.03125 # 1/32
  dead_steps_threshold: 1000
  normalize_decoder: true

corpus:
  en_name: HuggingFaceFW/fineweb-edu
  en_subset: sample-10BT
  en_split: train
  en_text_col: text
  zh_name: opencsg/chinese-fineweb-edu
  zh_subset: null
  zh_split: train
  zh_text_col: text
  en_ratio: 0.5
  cache_dir: data/cache
  streaming: true
  streaming_batch_size: 1024

activation_store:
  sae_batch_size: 4096
  buffer_size_tokens: 524288
  refill_threshold: 0.5
  ctx_len: 512
  model_batch_size: 24

trainer:
  lr: 3.0e-4
  weight_decay: 0.0
  betas: [0.9, 0.999]
  grad_clip: 1.0
  steps_per_epoch: 1000
  val_steps: 50
  max_epochs: 200
  lr_decay_factor: 0.7
  lr_patience_epochs: 3
  early_stop_lr_patience_epochs: 15
  seed: 0
  grad_accum: 1
  save_every_steps: 100
